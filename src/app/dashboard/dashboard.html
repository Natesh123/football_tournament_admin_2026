@if (isLoadingStats()) {
<div class="h-[calc(100vh-64px)] flex items-center justify-center">
    <app-loader></app-loader>
</div>
} @else {
<div class="max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <app-hero (createTournament)="openCreateModal()"></app-hero>

    <!-- System Overview & Live Activity -->
    <app-stats-board [platformStats]="platformStats()" [activityStats]="activityStats()"
        [showAllSections]="true"></app-stats-board>

    <!-- Main Content Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 xl:grid-cols-4 gap-8">
        <div class="lg:col-span-2 xl:col-span-3">
            <app-match-feed></app-match-feed>
        </div>
        <div class="lg:col-span-1 xl:col-span-1">
            <app-widgets></app-widgets>
        </div>
    </div>
</div>
}

<!-- Shared Create Tournament Modal -->
<app-tournament-create-modal
    [show]="showCreateModal()"
    (onClose)="closeCreateModal()"
    (onSuccess)="onTournamentCreated($event)">
</app-tournament-create-modal>

<!-- Toast Notification -->
@if (toastMessage()) {
<div
    class="fixed top-[112px] right-6 z-50 rounded-xl px-5 py-3 shadow-[0_0_30px_rgba(0,0,0,0.5)] flex items-center gap-3 animate-[slideInDown_0.3s_ease-out]"
    [ngClass]="{
        'bg-emerald-400/10 border border-emerald-400/30': toastMessage()?.type === 'success',
        'bg-red-400/10 border border-red-400/30': toastMessage()?.type === 'error',
        'bg-black-card border border-gold-400/30': toastMessage()?.type === 'info'
    }">
    <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"
        [ngClass]="{
            'bg-emerald-400/20 text-emerald-400': toastMessage()?.type === 'success',
            'bg-red-400/20 text-red-400': toastMessage()?.type === 'error',
            'bg-gold-400/20 text-gold-400': toastMessage()?.type === 'info'
        }">
        @if (toastMessage()?.type === 'success') {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
        } @else if (toastMessage()?.type === 'error') {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        }
    </div>
    <span class="text-sm text-white font-bold">{{ toastMessage()?.text }}</span>
</div>
}
